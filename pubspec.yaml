name: voiceguru
description: "VoiceGuru — Voice-first EdTech assistant for students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Voice Engine
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Networking
  http: ^1.3.0

  # Offline Cache
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4

  # Camera / Vision
  image_picker: ^1.1.2

  # UI / Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Supabase
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
